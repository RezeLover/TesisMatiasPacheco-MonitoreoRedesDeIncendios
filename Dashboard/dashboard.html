<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervisión Red de Incendio — CIMUBB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css?v=15">
  <script src="chart.umd.js"></script>
  <script src="dashboard.js?v=15" defer></script>
</head>
<body>

<div class="crit-vignette" id="critVignette"></div>

<header class="header">
  <div class="hdr-brand">
    <div class="hdr-mark" id="hdrMark" title="Lampara maestra del sistema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3c.6 3 3.2 4 3.2 7.2A3.2 3.2 0 0 1 12 13.4a3.2 3.2 0 0 1-3.2-3.2c0-1 .5-1.8 1-2.4"/>
        <path d="M12 21a6 6 0 0 0 6-6c0-3-2-5-3.4-7 .4 2-.6 3.4-2 4.6C11 8.4 9.5 6.6 9.6 4.4 7.6 6.4 6 8.6 6 12a6 6 0 0 0 6 9z"/>
      </svg>
    </div>
    <div>
      <div class="hdr-title">Supervisión de Red de Incendio</div>
      <div class="hdr-sub">Continuidad operativa · CIMUBB</div>
    </div>
  </div>
  <div class="hdr-readout">
    <div class="ro">
      <div class="ro-label">Nodos</div>
      <div class="ro-value"><span id="roNodosVal">0/0</span></div>
    </div>
    <div class="ro" id="roAlertas">
      <div class="ro-label">Alertas</div>
      <div class="ro-value"><span id="roAlertasVal">0</span></div>
    </div>
    <div class="ro" id="roEnlace">
      <div class="ro-label">Enlace</div>
      <div class="ro-value"><span class="ro-lamp"></span><span id="roEnlaceVal">···</span></div>
    </div>
  </div>
</header>

<div class="crit-banner" id="critBanner"></div>

<div class="layout">

  <div class="sidebar-left">
    <div class="state-panel" id="statePanel">
      <div class="sp-top">
        <span class="sp-lamp"></span>
        <span class="sp-level" id="spLevel">Sistema normal</span>
      </div>
      <div class="sp-detail" id="spDetail">Sistema en rango normal</div>
    </div>

    <div class="control-section">
      <button class="btn-file" onclick="openNodeModal()">GESTIONAR NODOS</button>
      <button class="btn-file" id="btnSim" onclick="toggleSim()">INICIAR SIMULACIÓN</button>
      <button class="btn-action" onclick="simAlert()">SIMULAR CRÍTICO</button>
      <button class="btn-action" onclick="clearAlertLog()">LIMPIAR REGISTRO</button>
    </div>

    <div class="stats-box">
      <div class="stat-row"><span>Paquetes</span><span id="sPkts">0</span></div>
      <div class="stat-row"><span>Alertas</span><span id="sAlerts">0</span></div>
      <div class="stat-row"><span>Nodos online</span><span id="sNodos">0</span></div>
      <div class="stat-row"><span>Últ. alerta</span><span id="sLastAlert">—</span></div>
    </div>
  </div>

  <div class="main-content">
    <div class="grid-nodos" id="nodeGrid"></div>
  </div>

  <div class="sidebar-right">
    <div class="charts-section">
      <div class="chart-box">
        <div class="cb-title">Temperatura (°C)</div>
        <canvas id="chart-temp"></canvas>
      </div>
      <div class="chart-box">
        <div class="cb-title">Humo (ppm)</div>
        <canvas id="chart-humo"></canvas>
      </div>
    </div>
    <div class="event-log">
      <div class="el-title">Registro de Alertas</div>
      <div class="el-list" id="eventLogList"></div>
      <button class="el-toggle" id="elToggle" onclick="toggleLogView()" style="display:none">VER TODOS</button>
    </div>
  </div>

</div>

<div class="modal-overlay" id="nodeModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Gestión de Nodos</div>
      <button class="modal-close" onclick="closeNodeModal()">X</button>
    </div>
    <div class="modal-body">
      <div class="nm-list" id="nmList"></div>
      <div class="nm-form">
        <div class="nm-form-title" id="nmFormTitle">Agregar nodo</div>
        <input type="text" id="nmId" placeholder="ID del nodo (ej: ESP32-Nodo-05)">
        <input type="text" id="nmZona" placeholder="Nombre de la zona (ej: Brazo Mecanico)">
        <div class="nm-sensores" id="nmSensores"></div>
        <div class="nm-actions">
          <button class="nm-save" onclick="submitNodeForm()">GUARDAR</button>
          <button class="nm-cancel" onclick="resetNodeForm()">CANCELAR</button>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
